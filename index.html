<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste: As 5 Linguagens do Amor | Terapia</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="overlay"></div>
    <div class="container">
        <header>
            <div class="tag">Avaliação Psicológica</div>
            <h1>As 5 Linguagens do Amor</h1>
            <p class="subtitle">Identificando as pontes de conexão emocional no casamento.</p>
        </header>

        <div id="selectionScreen" class="card text-center">
            <h2 class="question-title" style="text-align: center;">Qual questionário você deseja responder?</h2>
            <div class="selection-buttons">
                <button type="button" class="btn-select" onclick="startQuiz('maridos')">Questionário para Maridos</button>
                <button type="button" class="btn-select" onclick="startQuiz('esposas')">Questionário para Esposas</button>
            </div>
        </div>

        <form id="quizForm" class="hidden">
            <div class="card intro-card">
                <label for="nome"><strong>Para começar, qual o seu nome?</strong></label>
                <input type="text" id="nome" name="nome" required placeholder="Digite aqui seu nome completo">
            </div>

            <div id="questionsContainer">
            </div>

            <div class="footer-actions">
                <button type="submit" id="submitBtn">Finalizar e Enviar Resultados</button>
                <button type="button" class="btn-outline" onclick="location.reload()" style="margin-top: 15px;">Voltar ao Início</button>
            </div>
        </form>

        <div id="resultContainer" class="hidden">
            <div class="result-header">
                <h2>Resultado da Avaliação</h2>
                <p>Sua linguagem predominante é o modo como você mais se sente amado(a).</p>
            </div>

            <div class="user-info">Paciente: <span id="resNome"></span></div>

            <div id="rankingList"></div>

            <div class="actions">
                <button id="whatsappBtn" class="btn-whatsapp">

                    Enviar para o Terapeuta
                </button>
                <button onclick="location.reload()" class="btn-outline" style="margin-top: 15px;">Refazer Questionário</button>
            </div>
        </div>

        <footer>
            <div class="signature">Eduardo Henrique Sales Dos Santos</div>
            <div class="signature-title">Terapeuta</div>
        </footer>
    </div>
    <script src="script.js"></script>
</body>

</html>
